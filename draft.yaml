models:
  Sekolah:
    softDeletes: true
    timestamps: true
    npsn: string:8 unique
    name: string:255
    ajaran: string:4
    semester: integer

    logo: string

    relationships:
      hasMany: TmKelas

  TmKelas:
    timestamps: true
    sekolah_id: foreignId
    nama: string:255
    tingkat: integer

    relationships:
      belongsTo: Sekolah
      hasMany: TrKelas

  TrKelas:
    timestamps: true
    tm_kelas_id: foreignId
    nama: string
    ruangan: string
    siswa_aktif: integer
    ajaran: string:4
    semester: integer
    status: enum:Aktif,Tidak_Aktif default:Aktif
    relationships:
      belongsTo: TmKelas,User
      hasMany: Siswa

  Siswa:
    softDeletes: true
    timestamps: true
    tr_kelas_id: foreignId
    nisn: string:255 unique
    name: string:255
    gender: enum:Laki-laki,Perempuan



    relationships:
      belongsTo: TrKelas
      hasMany: HafalanSiswa,RiwayatHafalan
      hasOne: Tahfidz

  HafalanSiswa:
    relationships:
      belongsTo: Siswa,Surah,Tahfidz

  Tahfidz:
    timestamps: true
    siswa_id: foreignId
    catatan: text
    total_hafalan: integer
    target_hafalan: integer
    relationships:
      belongsTo: Siswa
      hasMany: HafalanSiswa

  Surah:
    timestamps: true
    number: integer
    name: string:255



    relationships:
      hasMany: HafalanSiswa

  RiwayatHafalan:
    timestamps: true
    siswa_id: foreignId
    surah_id: foreignId
    tanggal_hafalan: date
    nilai: integer min:0,max:100
    keterangan: text
    jenis_hafalan: enum:Murni,BinNazhar
    status: enum:Belum_Hafal,Lancar,Mutqin
    ajaran: string:4
    semester: integer
    relationships:
      belongsTo: Siswa,Surah



seeders:
  - Sekolah
  - TmKelas
  - TrKelas
  - Siswa
  - HafalanSiswa
  - Tahfidz
  - Surah
  - RiwayatHafalan
